<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول | نظام العيادة</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      transition: background-color 0.25s ease, border-color 0.2s ease, color 0.2s, box-shadow 0.2s;
    }

    body {
      font-family: 'Inter', 'Segoe UI', Tahoma, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-gradient);
      padding: 1.5rem;
    }

    :root {
      --bg-gradient: linear-gradient(135deg, #f5f7fc 0%, #e9eef5 100%);
      --card-bg: rgba(255, 255, 255, 0.96);
      --card-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2), 0 2px 8px rgba(0, 0, 0, 0.02);
      --text-primary: #1e293b;
      --text-secondary: #475569;
      --text-muted: #64748b;
      --border-light: #e2e8f0;
      --input-bg: #ffffff;
      --input-border: #cbd5e1;
      --input-focus: #3b82f6;
      --btn-primary: #2563eb;
      --btn-primary-hover: #1d4ed8;
      --btn-text: white;
      --icon-color: #5b6e8c;
      --toggle-bg: #f1f5f9;
      --toggle-border: #cbd5e1;
    }

    [data-theme="dark"] {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #111827 100%);
      --card-bg: rgba(30, 35, 48, 0.96);
      --card-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5), 0 2px 10px rgba(0, 0, 0, 0.3);
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e6;
      --text-muted: #94a3b8;
      --border-light: #334155;
      --input-bg: #1e293b;
      --input-border: #475569;
      --input-focus: #60a5fa;
      --btn-primary: #3b82f6;
      --btn-primary-hover: #2563eb;
      --btn-text: #ffffff;
      --icon-color: #94a3b8;
      --toggle-bg: #1e293b;
      --toggle-border: #475569;
    }

    .login-card {
      width: 100%;
      max-width: 460px;
      background: var(--card-bg);
      backdrop-filter: blur(2px);
      border-radius: 2rem;
      padding: 2rem 2rem 2.2rem;
      box-shadow: var(--card-shadow);
      border: 1px solid rgba(255,255,255,0.2);
      transition: transform 0.2s ease;
    }
    .login-card:hover {
      transform: translateY(-3px);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.75rem;
    }
    .toggle-group {
      display: flex;
      gap: 0.75rem;
    }
    .toggle-btn {
      background: var(--toggle-bg);
      border: 1px solid var(--toggle-border);
      border-radius: 3rem;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.3rem;
      color: var(--text-secondary);
      transition: all 0.2s;
    }
    .toggle-btn:hover {
      background: var(--btn-primary);
      color: white;
      border-color: var(--btn-primary);
      transform: scale(0.96);
    }
    .lang-btn {
      width: auto;
      padding: 0 1rem;
      font-weight: 600;
      font-size: 0.9rem;
      gap: 6px;
    }
    .lang-btn i {
      font-size: 1rem;
    }
    h2 {
      font-size: 1.9rem;
      font-weight: 700;
      background: linear-gradient(120deg, var(--text-primary), var(--btn-primary));
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
      margin: 0;
    }

    .input-group {
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--text-secondary);
    }
    .input-icon {
      position: relative;
      display: flex;
      align-items: center;
    }
    .input-icon i {
      position: absolute;
      left: 1rem;
      color: var(--icon-color);
      font-size: 1.1rem;
      pointer-events: none;
    }
    body[dir="rtl"] .input-icon i {
      left: auto;
      right: 1rem;
    }
    .input-icon input {
      width: 100%;
      padding: 0.9rem 1rem 0.9rem 2.7rem;
      border-radius: 1.2rem;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      font-size: 1rem;
      color: var(--text-primary);
      outline: none;
      font-weight: 500;
    }
    body[dir="rtl"] .input-icon input {
      padding: 0.9rem 2.7rem 0.9rem 1rem;
    }
    .input-icon input:focus {
      border-color: var(--input-focus);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
    }
    .input-icon input::placeholder {
      color: var(--text-muted);
      font-weight: 400;
    }

    .login-btn {
      width: 100%;
      background: var(--btn-primary);
      border: none;
      padding: 0.9rem;
      border-radius: 2rem;
      font-size: 1rem;
      font-weight: 700;
      color: var(--btn-text);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.25s;
      margin-top: 0.5rem;
      box-shadow: 0 8px 18px rgba(37,99,235,0.2);
    }
    .login-btn:hover {
      background: var(--btn-primary-hover);
      transform: scale(0.98);
    }
    .login-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .error-msg {
      color: #ef4444;
      background: rgba(239, 68, 68, 0.1);
      padding: 10px;
      border-radius: 1rem;
      text-align: center;
      margin-top: 12px;
      display: none;
      font-size: 0.85rem;
      font-weight: 500;
    }
    .error-msg.show {
      display: block;
      animation: shake 0.3s ease;
    }
    @keyframes shake {
      0%,100%{ transform: translateX(0); }
      25%{ transform: translateX(-4px); }
      75%{ transform: translateX(4px); }
    }

    .footer-note {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    @media (max-width: 500px) {
      .login-card { padding: 1.6rem; }
      h2 { font-size: 1.6rem; }
      .toggle-btn { width: 38px; height: 38px; }
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="card-header">
      <h2 id="loginTitle">تسجيل الدخول</h2>
      <div class="toggle-group">
        <button class="toggle-btn" id="themeBtn" title="الوضع الليلي">
          <i class="fas fa-moon" id="themeIcon"></i>
        </button>
        <button class="toggle-btn lang-btn" id="langBtn">
          <i class="fas fa-globe"></i> <span id="langBtnText">EN</span>
        </button>
      </div>
    </div>

    <form id="loginForm">
      <div class="input-group">
        <label id="emailLabel">البريد الإلكتروني</label>
        <div class="input-icon">
          <i class="fas fa-envelope"></i>
          <input type="email" id="email" placeholder="أدخل بريدك" autocomplete="email" required>
        </div>
      </div>
      <div class="input-group">
        <label id="passLabel">كلمة المرور</label>
        <div class="input-icon">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" placeholder="أدخل كلمة المرور" autocomplete="current-password" required>
        </div>
      </div>
      <button type="submit" class="login-btn" id="loginBtn">
        <i class="fas fa-arrow-right-to-bracket"></i> <span id="btnText">دخول</span>
      </button>
    </form>

    <div id="errorMsg" class="error-msg"></div>
    <div class="footer-note" id="footerText">✨ نظام العيادة © 2026</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    let lang = localStorage.getItem('clinic_lang') || 'ar';
    let theme = localStorage.getItem('clinic_theme') || 'light';

    const T = {
      ar: {
        title: "تسجيل الدخول",
        emailLbl: "البريد الإلكتروني",
        emailPh: "أدخل بريدك",
        passLbl: "كلمة المرور",
        passPh: "أدخل كلمة المرور",
        btn: "دخول",
        footer: "✨ نظام العيادة © 2026",
        flag: "EN",
        themeT: "الوضع الليلي",
        langT: "English",
        errAuth: "❌ البريد أو كلمة المرور غير صحيحة",
        errConn: "❌ فشل الاتصال بقاعدة البيانات",
        ld: "جاري...",
        pages: {
          super: 'super-admin.html',
          admin: 'Dashboard.html',
          scanner: 'Scan.html',
          home: 'home.html'
        }
      },
      en: {
        title: "Login",
        emailLbl: "Email",
        emailPh: "Enter email",
        passLbl: "Password",
        passPh: "Enter password",
        btn: "Sign In",
        footer: "✨ Clinic System © 2026",
        flag: "🇸🇦",
        themeT: "Dark Mode",
        langT: "العربية",
        errAuth: "❌ Invalid email or password",
        errConn: "❌ Connection failed",
        ld: "Loading...",
        pages: {
          super: 'super-admin.html',
          admin: 'Dashboard.html',
          scanner: 'Scan.html',
          home: 'home.html'
        }
      }
    };

    function applyTheme(themeValue) {
      document.documentElement.setAttribute('data-theme', themeValue);
      const themeIcon = document.getElementById('themeIcon');
      if (themeValue === 'dark') {
        themeIcon.className = 'fas fa-sun';
      } else {
        themeIcon.className = 'fas fa-moon';
      }
      document.getElementById('themeBtn').title = T[lang].themeT;
      localStorage.setItem('clinic_theme', themeValue);
    }

    function toggleTheme() {
      theme = theme === 'dark' ? 'light' : 'dark';
      applyTheme(theme);
    }

    function applyLang(l) {
      const t = T[l];
      document.documentElement.lang = l;
      document.documentElement.dir = l === 'ar' ? 'rtl' : 'ltr';
      document.body.setAttribute('dir', l === 'ar' ? 'rtl' : 'ltr');

      document.getElementById('loginTitle').textContent = t.title;
      document.getElementById('emailLabel').textContent = t.emailLbl;
      document.getElementById('email').placeholder = t.emailPh;
      document.getElementById('passLabel').textContent = t.passLbl;
      document.getElementById('password').placeholder = t.passPh;
      document.getElementById('btnText').textContent = t.btn;
      document.getElementById('footerText').textContent = t.footer;
      document.getElementById('langBtnText').textContent = t.flag;

      document.getElementById('themeBtn').title = t.themeT;
      document.getElementById('langBtn').title = t.langT;

      localStorage.setItem('clinic_lang', l);
    }

    function toggleLang() {
      lang = lang === 'ar' ? 'en' : 'ar';
      applyLang(lang);
    }

    const SUPABASE_URL = 'https://ncqvzpcqotdiwjqbwlwp.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_98lfpU1zaqG-MNxkhlvg6g_KEMPMPbS';
    let sb = null;

    document.addEventListener('DOMContentLoaded', () => {
      applyTheme(theme);
      applyLang(lang);

      document.getElementById('themeBtn').addEventListener('click', toggleTheme);
      document.getElementById('langBtn').addEventListener('click', toggleLang);

      if (typeof supabase !== 'undefined') {
        sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        console.log('✅ Supabase Client Initialized');
      } else {
        console.warn('⚠️ Supabase CDN Failed to Load.');
        const errDiv = document.getElementById('errorMsg');
        errDiv.textContent = lang === 'ar' ? '⚠️ لم يتم تحميل مكتبة الاتصال.' : '⚠️ Connection library not loaded.';
        errDiv.classList.add('show');
      }

      const loginForm = document.getElementById('loginForm');
      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!sb) {
          alert(lang === 'ar' ? '⚠️ مكتبة الاتصال غير محملة.' : '⚠️ Supabase library not loaded.');
          return;
        }

        const btn = document.getElementById('loginBtn');
        const btnSpan = document.getElementById('btnText');
        const errorDiv = document.getElementById('errorMsg');
        const t = T[lang];

        errorDiv.classList.remove('show');
        btn.disabled = true;
        btnSpan.textContent = t.ld;

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        try {
          const { data, error } = await sb.auth.signInWithPassword({ email, password });
          if (error) throw error;

          const { data: profile, error: profileError } = await sb
            .from('profiles')
            .select('role')
            .eq('id', data.user.id)
            .single();

          if (profileError || !profile) throw new Error('Role not found');

          const role = profile.role;
          const pages = t.pages;

          if (role === 'super_admin') window.location.href = pages.super;
          else if (role === 'admin') window.location.href = pages.admin;
          else if (role === 'scanner') window.location.href = pages.scanner;
          else window.location.href = pages.home;

        } catch (err) {
          console.error('Login Error:', err);
          errorDiv.textContent = err.message?.includes('Invalid') ? t.errAuth : t.errConn;
          errorDiv.classList.add('show');
          btn.disabled = false;
          btnSpan.textContent = t.btn;
        }
      });
    });
  </script>
</body>
</html>

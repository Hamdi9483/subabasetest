<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="pageTitle">تسجيل الدخول | نظام العيادة</title>
  <style>
    :root { --primary: #4f46e5; --bg: #f8fafc; --card: #fff; --txt: #0f172a; --brd: #e2e8f0; }
    [data-theme="dark"] { --bg: #0f172a; --card: #1e293b; --txt: #f1f5f9; --brd: #334155; }
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Tahoma,sans-serif; transition:all 0.3s; }
    body { background:var(--bg); color:var(--txt); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
    .login-container { background:var(--card); padding:30px; border-radius:20px; box-shadow:0 10px 40px rgba(0,0,0,0.1); width:100%; max-width:400px; border:1px solid var(--brd); }
    .login-header { text-align:center; margin-bottom:24px; }
    .login-header h2 { font-size:1.5rem; font-weight:700; background:linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .login-header p { color:#64748b; font-size:0.9rem; margin-top:6px; }
    .ctrl-btns { display:flex; justify-content:flex-end; gap:8px; margin-bottom:16px; }
    .ctrl-btn { width:36px; height:36px; border-radius:10px; border:none; background:var(--bg); color:var(--txt); cursor:pointer; font-size:1rem; display:flex; align-items:center; justify-content:center; }
    .ctrl-btn:hover { background:var(--primary); color:#fff; }
    .form-group { margin-bottom:18px; }
    label { display:block; margin-bottom:6px; font-weight:600; font-size:0.95rem; }
    input { width:100%; padding:12px; border:2px solid var(--brd); border-radius:12px; font-size:1rem; background:var(--bg); color:var(--txt); outline:none; }
    input:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(79,70,229,0.15); }
    .btn { width:100%; padding:14px; border:none; border-radius:12px; background:var(--primary); color:#fff; font-size:1rem; font-weight:600; cursor:pointer; transition:0.2s; }
    .btn:hover { background:#4338ca; transform:translateY(-1px); }
    .btn:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
    .error-msg { color:#ef4444; font-size:0.85rem; text-align:center; margin-top:10px; display:none; background:rgba(239,68,68,0.1); padding:8px; border-radius:8px; }
    .footer { text-align:center; margin-top:20px; font-size:0.85rem; color:var(--txt); opacity:0.7; }
    .links { text-align:center; margin-top:16px; font-size:0.9rem; }
    .links a { color:var(--primary); text-decoration:none; font-weight:500; }
    .links a:hover { text-decoration:underline; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="ctrl-btns">
      <button class="ctrl-btn" id="langBtn" title="English" onclick="toggleLang()">EN</button>
      <button class="ctrl-btn" id="themeBtn" title="الوضع الليلي" onclick="toggleTheme()">🌙</button>
    </div>
    <div class="login-header">
      <h2 id="loginTitle">Login</h2>
      <p id="loginSubtitle">Welcome to Clinic Management</p>
    </div>
    <form id="loginForm">
      <div class="form-group">
        <label id="emailLabel">Email</label>
        <input type="email" id="email" placeholder="Enter your email" required>
      </div>
      <div class="form-group">
        <label id="passLabel">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn" id="loginBtn"><span id="btnText">Login</span></button>
    </form>
    <div id="errorMsg" class="error-msg"></div>
    <div class="links">
      <a href="#" id="forgotLink">Forgot password?</a> • <a href="#" id="createLink">Create account</a>
    </div>
    <div class="footer" id="footerText">✨ Welcome</div>
  </div>

  <!-- ✅ مكتبة Supabase الرسمية -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <script>
    // ========================================
    // 🔑 مفاتيح Supabase الخاصة بك
    // ========================================
    const SUPABASE_URL = 'https://ncqvzpcqotdiwjqbwlwp.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_98lfpU1zaqG-MNxkhlvg6g_KEMPMPbS';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ========================================
    // 🌐 حالة التطبيق والترجمات
    // ========================================
    let currentLang = localStorage.getItem('clinic_lang') || 'ar';
    let currentTheme = localStorage.getItem('clinic_theme') || 'light';

    const translations = {
      ar: {
        pageTitle: "تسجيل الدخول | نظام العيادة",
        loginTitle: "تسجيل الدخول",
        loginSubtitle: "مرحباً بك في نظام إدارة العيادة",
        emailLabel: "البريد الإلكتروني",
        emailPh: "أدخل بريدك الإلكتروني",
        passLabel: "كلمة المرور",
        passPh: "أدخل كلمة المرور",
        btnText: "دخول",
        errorMsg: "❌ البريد أو كلمة المرور غير صحيحة",
        connError: "❌ خطأ في الاتصال",
        loading: "جاري الدخول...",
        forgot: "نسيت كلمة المرور؟",
        create: "إنشاء حساب جديد",
        footer: "✨ نظام العيادة © 2026",
        langTitle: "English",
        themeTitle: "الوضع الليلي",
        routes: { super: 'super-admin.html', admin: 'Dashboard.html', scanner: 'Scan.html', home: 'home.html' }
      },
      en: {
        pageTitle: "Login | Clinic System",
        loginTitle: "Login",
        loginSubtitle: "Welcome to Clinic Management",
        emailLabel: "Email Address",
        emailPh: "Enter your email",
        passLabel: "Password",
        passPh: "Enter your password",
        btnText: "Sign In",
        errorMsg: "❌ Invalid credentials",
        connError: "❌ Connection error",
        loading: "Signing in...",
        forgot: "Forgot password?",
        create: "Create account",
        footer: "✨ Clinic System © 2026",
        langTitle: "العربية",
        themeTitle: "Dark Mode",
        routes: { super: 'super-admin.html', admin: 'Dashboard.html', scanner: 'Scan.html', home: 'home.html' }
      }
    };

    // ========================================
    // 🔄 دوال تبديل اللغة والسمة
    // ========================================
    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      document.getElementById('themeBtn').innerHTML = theme === 'dark' ? '☀️' : '🌙';
      document.getElementById('themeBtn').title = translations[currentLang].themeTitle;
      localStorage.setItem('clinic_theme', theme);
    }

    function toggleTheme() {
      currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
      applyTheme(currentTheme);
    }

    function applyLanguage(lang) {
      const t = translations[lang];
      document.documentElement.lang = lang;
      document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
      
      document.getElementById('loginTitle').textContent = t.loginTitle;
      document.getElementById('loginSubtitle').textContent = t.loginSubtitle;
      document.getElementById('emailLabel').textContent = t.emailLabel;
      document.getElementById('email').placeholder = t.emailPh;
      document.getElementById('passLabel').textContent = t.passLabel;
      document.getElementById('password').placeholder = t.passPh;
      document.getElementById('btnText').textContent = t.btnText;
      document.getElementById('forgotLink').textContent = t.forgot;
      document.getElementById('createLink').textContent = t.create;
      document.getElementById('footerText').textContent = t.footer;
      
      document.getElementById('langBtn').textContent = lang === 'ar' ? 'EN' : '🇸🇦';
      document.getElementById('langBtn').title = t.langTitle;
      document.getElementById('themeBtn').title = t.themeTitle;
      
      localStorage.setItem('clinic_lang', lang);
    }

    function toggleLang() {
      currentLang = currentLang === 'ar' ? 'en' : 'ar';
      applyLanguage(currentLang);
    }

    // ========================================
    // 🎯 التوجيه حسب الصلاحية
    // ========================================
    function redirectToPage(role) {
      const routes = translations[currentLang].routes;
      if (role === 'super_admin') window.location.href = routes.super;
      else if (role === 'admin') window.location.href = routes.admin;
      else if (role === 'scanner') window.location.href = routes.scanner;
      else window.location.href = routes.home;
    }

    // ========================================
    // 🚀 معالجة تسجيل الدخول
    // ========================================
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const btn = document.getElementById('loginBtn');
      const btnText = document.getElementById('btnText');
      const errorMsg = document.getElementById('errorMsg');
      const t = translations[currentLang];
      
      // إخفاء الأخطاء وتعطيل الزر
      errorMsg.style.display = 'none';
      btn.disabled = true;
      btnText.textContent = t.loading;

      try {
        // 1. تسجيل الدخول عبر Supabase Auth
        const { data, error } = await supabase.auth.signInWithPassword({
          email: document.getElementById('email').value.trim(),
          password: document.getElementById('password').value
        });
        if (error) throw error;

        // 2. جلب دور المستخدم من جدول profiles
        const { data: profile, error: profileErr } = await supabase
          .from('profiles')
          .select('role')
          .eq('id', data.user.id)
          .single();

        if (profileErr || !profile) throw new Error('Profile not found');

        // 3. التوجيه الآمن حسب الصلاحية
        redirectToPage(profile.role);

      } catch (err) {
        console.error('Login Error:', err);
        const isAuthError = err.message?.includes('Invalid') || err.message?.includes('credentials');
        errorMsg.textContent = isAuthError ? t.errorMsg : t.connError;
        errorMsg.style.display = 'block';
        
        btn.disabled = false;
        btnText.textContent = t.btnText;
      }
    });

    // ========================================
    // 🎬 التهيئة عند تحميل الصفحة
    // ========================================
    window.addEventListener('DOMContentLoaded', () => {
      applyTheme(currentTheme);
      applyLanguage(currentLang);
    });
  </script>
</body>
</html>
